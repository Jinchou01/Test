<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title id="page-title"></title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #222;
    }

    p {
      line-height: 1.6;
      font-size: 16px;
      margin-bottom: 20px;
    }

    ul {
      padding-left: 20px;
      margin-bottom: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #007BFF;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .highlight {
      background: #f0f4ff;
      padding: 15px;
      border-left: 4px solid #4CAF50;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .lang-switch {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  gap: 8px;
}

.lang-switch button {
  width: 90px;
  height: 36px;

  border: none;
  border-radius: 8px;

  background: #f5f5f5;
  color: #333;

  font-size: 14px;
  font-weight: 500;

  cursor: pointer;
  transition: all 0.25s ease;
}

/* hover */
.lang-switch button:hover {
  background: #007BFF;
  color: white;
  transform: translateY(-1px);
}

/* 鐐瑰嚮 */
.lang-switch button:active {
  transform: scale(0.96);
}
  </style>

  <!-- 鉁� 寮曞叆 i18n -->
  <script src="i18n.js"></script>

</head>
<body>

  <!-- 馃寪 璇█鍒囨崲鎸夐挳 -->
  <div class="lang-switch">
    <button onclick="setLanguage('en')">EN</button>
    <button onclick="setLanguage('zh')">涓枃</button>
  </div>

  <div class="container">
    <h1 id="title"></h1>

    <p id="desc"></p>

    <div class="highlight" id="highlight"></div>

    <p id="usage"></p>

    <ul>
      <li id="item1"></li>
      <li id="item2"></li>
    </ul>

    <p id="footer"></p>

    <a href="index.html" class="back-link" id="back"></a>
  </div>

  <!-- 鉁� 鍔ㄦ€佸～鍏呮枃鏈� -->
  <script>
    function renderText() {
      document.getElementById("page-title").innerText = t("privacy.title");
      document.getElementById("title").innerText = t("privacy.title");
      document.getElementById("desc").innerText = t("privacy.desc");
      document.getElementById("highlight").innerText = t("privacy.highlight");
      document.getElementById("usage").innerText = t("privacy.usage");
      document.getElementById("item1").innerText = t("privacy.item1");
      document.getElementById("item2").innerText = t("privacy.item2");
      document.getElementById("footer").innerText = t("privacy.footer");
      document.getElementById("back").innerText = t("privacy.back");
    }

    renderText();
  </script>

</body>
</html>
